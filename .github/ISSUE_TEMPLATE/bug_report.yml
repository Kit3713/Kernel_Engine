name: Bug Report
description: Report a parser error, incorrect output, or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input
      description: The `.icl` source that triggers the bug. Minimal reproducer preferred.
      render: text
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Actual output
      description: Paste the compiler output, error message, or panic trace.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected output
      description: What should have happened instead?
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ironclad --version` or commit hash.
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS, architecture, Rust toolchain version.
      placeholder: "e.g. Fedora 41, x86_64, rustc 1.82"
    validations:
      required: false
